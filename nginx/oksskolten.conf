# Nginx reverse proxy for oksskolten
#
# Assumptions:
# - oksskolten backend listens on 127.0.0.1:3000
# - the backend serves both the API and the built frontend from `dist/`
# - TLS is terminated elsewhere, or you will add `listen 443 ssl` settings
#
# If you want to proxy the Vite dev server instead, change `proxy_pass`
# in `location /` to `http://127.0.0.1:5173`.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream oksskolten_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name oksskolten.example.com;

    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Streaming endpoints use SSE. Disable buffering so clients receive
    # events immediately instead of waiting for Nginx to flush buffers.
    location /api/ {
        proxy_pass http://oksskolten_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        add_header X-Accel-Buffering no;
    }

    # App shell and static assets
    location / {
        proxy_pass http://oksskolten_backend;
        proxy_read_timeout 300s;
    }
}
