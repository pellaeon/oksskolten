name: Coverage Badge

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

jobs:
  update-badges:
    name: Update Coverage Badges
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: server-coverage
          path: artifacts/server
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-coverage
          path: artifacts/client
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract coverage percentages
        run: |
          SERVER_PCT=$(jq '.total.lines.pct' artifacts/server/coverage-summary.json)
          CLIENT_PCT=$(jq '.total.lines.pct' artifacts/client/coverage-summary.json)
          echo "SERVER_PCT=$SERVER_PCT" >> $GITHUB_ENV
          echo "CLIENT_PCT=$CLIENT_PCT" >> $GITHUB_ENV

      - name: Update server coverage badge
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 7de3479899077c477335584e14d51adc
          filename: oksskolten-server-coverage.json
          label: server coverage
          message: ${{ env.SERVER_PCT }}%
          valColorRange: ${{ env.SERVER_PCT }}
          minColorRange: 0
          maxColorRange: 100

      - name: Update client coverage badge
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 7de3479899077c477335584e14d51adc
          filename: oksskolten-client-coverage.json
          label: client coverage
          message: ${{ env.CLIENT_PCT }}%
          valColorRange: ${{ env.CLIENT_PCT }}
          minColorRange: 0
          maxColorRange: 100
